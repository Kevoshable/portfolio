<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Kevin Junger Logo">
  <defs>
    <linearGradient id="kj-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="55%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <!-- Chip-Pins (Anspielung auf Hardware) -->
  <g stroke="url(#kj-grad)" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <line x1="50" y1="2"  x2="50" y2="12" />
    <line x1="50" y1="88" x2="50" y2="98" />
    <line x1="10" y1="27" x2="1"  y2="22" />
    <line x1="10" y1="73" x2="1"  y2="78" />
    <line x1="90" y1="27" x2="99" y2="22" />
    <line x1="90" y1="73" x2="99" y2="78" />
  </g>

  <!-- Hexagon-Chip-Umriss -->
  <path d="M50 8 L88 29 L88 71 L50 92 L12 71 L12 29 Z"
        fill="rgba(255,255,255,0.03)"
        stroke="url(#kj-grad)"
        stroke-width="3.5"
        stroke-linejoin="round" />

  <!-- Monogramm -->
  <text x="50" y="63" text-anchor="middle"
        font-family="'Sora', 'Arial Black', Arial, sans-serif"
        font-weight="800" font-size="34"
        fill="url(#kj-grad)" letter-spacing="-1">KJ</text>
</svg>
